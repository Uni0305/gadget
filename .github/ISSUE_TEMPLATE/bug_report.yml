name: Bug report
description: Create a report to help us improve
labels: ["bug"]
body:
  - type: textarea
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Steps to reproduce
      description: "Steps to reproduce the behavior:"
    validations:
      required: true
  - type: textarea
    attributes:
      label: Expected behavior
      description: "A clear and concise description of what you expected to happen."
    validations:
      required: true
  - type: textarea
    attributes:
      label: Actual behavior
      description: "Describe what actually happened instead of the expected behavior."
    validations:
      required: true
  - type: textarea
    attributes:
      label: Environment
      description: "Please provide details about your environment."
      value: |
        - Minecraft version:
        - Operating System:
        - Java version:
        - Fabric mods
          - fabric-api:
          - gadget:
          - owo-lib:
    validations:
      required: true
  - type: textarea
    attributes:
      label: Additional context
      description: "Add any other context about the problem here."
